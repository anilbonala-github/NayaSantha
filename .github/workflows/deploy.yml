name: Build & Deploy to Hostinger

# Builds the Flutter web release in CI and uploads it to public_html over FTP.
# Runs on every push to main, or manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    Hostinger FTP host (e.g. 82.25.120.116 or ftp.nayasantha.com)
#   FTP_USERNAME  FTP account username (hPanel -> Files -> FTP Accounts)
#   FTP_PASSWORD  FTP account password
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail early if FTP secrets are missing
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ] || [ -z "${{ secrets.FTP_USERNAME }}" ] || [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "::error::Add FTP_SERVER, FTP_USERNAME and FTP_PASSWORD repository secrets to enable deployment."
            exit 1
          fi

      - name: Diagnose FTP layout (temporary — reveals the correct server-dir)
        run: |
          sudo apt-get -qq update && sudo apt-get -qq install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<'EOF'
          set ssl:verify-certificate no
          set ftp:ssl-allow true
          echo ===== 1. LOGIN DIRECTORY (this is server-dir ./) =====
          pwd
          echo ===== 2. CONTENTS OF LOGIN DIR =====
          cls -l
          echo ===== 3. is main.dart.js right here in the login dir? =====
          cls -l main.dart.js
          echo ===== 4. public_html/ subdir? =====
          cls -l public_html/
          echo ===== 5. nested public_html/public_html/ ? =====
          cls -l public_html/public_html/
          bye
          EOF

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate web platform files
        run: flutter create . --platforms=web --org com.nayasantha

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release

      - name: Deploy to Hostinger public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/web/
          # The Hostinger FTP account is rooted at public_html, so upload to the
          # login root ("./"). Using "./public_html/" nested into
          # public_html/public_html/ and the live site never updated.
          server-dir: ./
          dangerous-clean-slate: false
